spring.application.name=event-service
server.port=8084

# DATABASE
spring.datasource.url=jdbc:mysql://mysql-db:3306/event_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# EUREKA
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# OPENFEIGN
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# REDIS
spring.cache.type=redis
spring.data.redis.host=redis-server
spring.data.redis.port=6379
spring.data.redis.timeout=3000ms
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# SWAGGER
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# UPLOAD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=/app/uploads

# ACTUATOR
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ERROR
server.error.include-message=always

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB