spring.application.name=booking-service

server.port=8087

# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://mysql-db:3306/booking_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# EUREKA
# ===============================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# RABBITMQ
# ===============================
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.connection-timeout=10000
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=1000
spring.rabbitmq.template.retry.max-attempts=3

# ===============================
# OPENFEIGN
# ===============================
spring.cloud.openfeign.circuitbreaker.enabled=true

spring.cloud.openfeign.client.config.default.connectTimeout=5000
spring.cloud.openfeign.client.config.default.readTimeout=10000
spring.cloud.openfeign.client.config.default.loggerLevel=basic

# Ticket Service tạo QR nên cần read timeout dài hơn
spring.cloud.openfeign.client.config.ticket-service.connectTimeout=5000
spring.cloud.openfeign.client.config.ticket-service.readTimeout=30000
spring.cloud.openfeign.client.config.ticket-service.loggerLevel=full

spring.cloud.openfeign.client.config.seat-service.connectTimeout=5000
spring.cloud.openfeign.client.config.seat-service.readTimeout=10000

# ===============================
# RESILIENCE4J
# ===============================
resilience4j.circuitbreaker.instances.ticket-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ticket-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.ticket-service.failureRateThreshold=60
resilience4j.circuitbreaker.instances.ticket-service.waitDurationInOpenState=15s
resilience4j.circuitbreaker.instances.ticket-service.permittedNumberOfCallsInHalfOpenState=3

resilience4j.circuitbreaker.instances.event-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.event-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.event-service.waitDurationInOpenState=10s

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# SWAGGER
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===============================
# LOG
# ===============================
logging.level.com.example.booking_service.feign.TicketClient=DEBUG
logging.level.com.example.booking_service.feign.SeatClient=DEBUG
logging.level.org.springframework.cloud.openfeign=INFO
