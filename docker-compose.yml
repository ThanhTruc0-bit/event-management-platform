services:
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: unless-stopped

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p123456"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  redis-server:
    image: redis:7
    container_name: redis-server
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_started
      redis-server:
        condition: service_healthy
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8090:8090"
    depends_on:
      eureka-server:
        condition: service_started
      redis-server:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  event-service:
    build: ./event-service
    container_name: event-service
    ports:
      - "8084:8084"
    volumes:
      - ./event-service/uploads:/app/uploads
    environment:
      FILE_UPLOAD_DIR: /app/uploads
    depends_on:
      eureka-server:
        condition: service_started
      redis-server:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  seat-service:
    build: ./seat-service
    container_name: seat-service
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  ticket-service:
    build: ./ticket-service
    container_name: ticket-service
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_started
      event-service:
        condition: service_started
      seat-service:
        condition: service_started
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8089:8089"
    environment:
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
    depends_on:
      eureka-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "8087:8087"
    depends_on:
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      event-service:
        condition: service_started
      seat-service:
        condition: service_started
      ticket-service:
        condition: service_started
      notification-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8088:8088"
    depends_on:
      eureka-server:
        condition: service_started
      booking-service:
        condition: service_started
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
