spring.application.name=api-gateway
server.port=8080

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# DISCOVERY LOCATOR
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# REDIS
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT - PHAI GIONG auth-service
jwt.secret=THIS_IS_A_VERY_LONG_SECRET_KEY_FOR_MICROSERVICE_JWT_AUTH_123456789

# RATE LIMIT
spring.cloud.gateway.server.webflux.default-filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.default-filters[0].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.server.webflux.default-filters[0].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.server.webflux.default-filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.server.webflux.default-filters[0].args.key-resolver=#{@ipKeyResolver}

# ================= AUTH SERVICE =================
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth-service/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1