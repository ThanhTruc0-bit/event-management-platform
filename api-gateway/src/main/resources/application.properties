spring.application.name=api-gateway
server.port=8080

# ================= EUREKA =================
# Chạy Docker Compose thì dùng dòng này
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

# Nếu chạy Maven trực tiếp trên Windows thì đổi thành:
# eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ================= DISCOVERY LOCATOR =================
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# ================= JWT =================
jwt.secret=THIS_IS_A_VERY_LONG_SECRET_KEY_FOR_MICROSERVICE_JWT_AUTH_123456789

# ================= AUTH SERVICE =================
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth-service/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

# ================= USER SERVICE =================
spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/user-service/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

# ================= EVENT SERVICE =================
spring.cloud.gateway.server.webflux.routes[2].id=event-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://EVENT-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/event-service/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

# ================= SEAT SERVICE =================
spring.cloud.gateway.server.webflux.routes[3].id=seat-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://SEAT-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/seat-service/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=StripPrefix=1

