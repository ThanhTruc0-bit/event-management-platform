spring.cloud.gateway.server.webflux.routes[5].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/payment-service/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=StripPrefix=1

# ================= TICKET SERVICE =================
spring.cloud.gateway.server.webflux.routes[6].id=ticket-service
spring.cloud.gateway.server.webflux.routes[6].uri=lb://TICKET-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/ticket-service/**
