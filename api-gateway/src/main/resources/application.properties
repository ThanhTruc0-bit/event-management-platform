spring.cloud.gateway.server.webflux.routes[4].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/booking-service/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=StripPrefix=1

# ================= PAYMENT SERVICE =================
